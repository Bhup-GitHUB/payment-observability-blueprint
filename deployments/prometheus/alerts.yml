groups:
  - name: payment_system
    rules:
      - alert: HighPaymentFailureRate
        expr: |
          rate(payment_requests_total{status="failed"}[5m])
          /
          (rate(payment_requests_total[5m]) + 0.0001) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Payment failure rate above 5%"
          description: "{{ $value | humanizePercentage }} of payments are failing"

      - alert: HighRiskRejectionRate
        expr: |
          rate(risk_evaluations_total{decision="rejected"}[5m])
          /
          (rate(risk_evaluations_total[5m]) + 0.0001) > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Risk rejection rate above 20%"

      - alert: SlowBankResponse
        expr: |
          histogram_quantile(0.99,
            rate(bank_authorization_duration_seconds_bucket[5m])
          ) > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "P99 bank response time above 3 seconds"

      - alert: PaymentServiceHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(payment_duration_seconds_bucket{status="completed"}[5m])
          ) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Payment service P95 latency above 5s"

      - alert: NoSuccessfulPayments
        expr: |
          sum(rate(payment_requests_total{status="completed"}[10m])) == 0
          and
          sum(rate(payment_requests_total[10m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Traffic present but no successful payments"
